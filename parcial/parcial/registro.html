<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Radical - Registro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>RADICAL</h1><nav><ul><li><a href="index.html">Inicio</a></li><li><a href="registro.html">Registro</a></li></ul></nav></header>
    <div class="form-container">
        <h2>Registro de Usuario</h2><br>
        <form>
            <div class="form-group"><label>Nombre Completo</label><input type="text"></div>
            <div class="form-group"><label>Documento de Identidad</label><input type="text"></div>
            <div class="form-group"><label>Sexo</label>
                <select><option>Masculino</option><option>Femenino</option></select>
            </div>
            <div class="form-group"><label>Nickname</label><input type="text"></div>
            <div class="form-group"><label>Contraseña</label><input type="password"></div>
            <div class="form-group"><label>Tipo de Usuario</label>
                <select><option>Usuario</option><option>Administrador</option></select>
            </div>
            <button class="btn">Crear Cuenta</button>
        </form>
    </div>
